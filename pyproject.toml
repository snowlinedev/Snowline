[project]
name = "snowline-platform"
version = "0.0.1"
description = "Snowline — an agent-native platform that hosts governance, PM, and other capabilities as MCP-server plugins."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
]

[dependency-groups]
dev = ["pytest>=8.0", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/snowline_platform"]

[tool.pytest.ini_options]
testpaths = ["tests"]
