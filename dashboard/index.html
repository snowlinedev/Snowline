<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Snowline</title>
    <script>
      // Pre-paint theme/density (mirror of src/prefs.ts — keep in sync): the
      // React bundle re-applies these, but without this the first paint is
      // always the light :root default and dark-preference users get a white
      // flash on every load.
      (function () {
        try {
          var t = localStorage.getItem("snowline.theme");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          var d =
            localStorage.getItem("snowline.density") === "compact"
              ? "compact"
              : "comfortable";
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.setAttribute("data-density", d);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
